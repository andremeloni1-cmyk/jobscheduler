name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  build:
    name: Typecheck, lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    env:
      # next build / prisma need a DATABASE_URL present; a throwaway SQLite
      # file is enough — the build never opens a real connection (API routes
      # are force-dynamic and run at request time, not build time).
      DATABASE_URL: "file:./ci.db"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      # Installs deps and generates the Prisma client via the postinstall hook.
      - run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npx next lint

      - name: Build
        run: npx next build
