# Rendered by 06-nginx-tls.sh -> /etc/nginx/sites-available/js7.conf
# Reverse proxy for the JS7 JOC Cockpit web UI.
#
# certbot --nginx will inject the listen 443 / ssl_certificate lines and an
# HTTP->HTTPS redirect into this server block automatically.

server {
    listen 80;
    listen [::]:80;
    server_name @@DOMAIN@@;

    # Allow Let's Encrypt HTTP-01 challenges; certbot manages the rest.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        proxy_pass http://127.0.0.1:@@JOC_HTTP_PORT@@;
        proxy_http_version 1.1;

        # Standard proxy headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # JOC Cockpit uses WebSockets for live updates
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # JOC long-running requests (workflow imports, etc.)
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # Security headers
        add_header X-Frame-Options        "SAMEORIGIN"        always;
        add_header X-Content-Type-Options "nosniff"           always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    }
}
